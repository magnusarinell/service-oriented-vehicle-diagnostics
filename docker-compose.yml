services:

  # ── D-Bus daemon ─────────────────────────────────────────────────────────
  dbus-daemon:
    image: ubuntu:22.04
    command: >
      bash -c "
        apt-get update -qq && apt-get install -y -qq dbus &&
        mkdir -p /run/dbus &&
        dbus-daemon --system --nofork --print-address
      "
    volumes:
      - dbus-socket:/run/dbus
    networks:
      - sovd-net

  # ── ZoneController / Zone Controller (SOME/IP service) ─────────────────────
  zone-controller:
    build:
      context: .
      dockerfile: docker/zone-controller.Dockerfile
    environment:
      VSOMEIP_CONFIGURATION: /etc/vsomeip/vsomeip.json
      ZONE_CONTROLLER_UNICAST: "172.20.0.10"
    networks:
      sovd-net:
        ipv4_address: 172.20.0.10

  # ── CDA / Component Diagnostic Adapter (SOME/IP client + D-Bus service) ──
  cda:
    build:
      context: .
      dockerfile: docker/cda.Dockerfile
    depends_on:
      - dbus-daemon
      - zone-controller
    volumes:
      - dbus-socket:/run/dbus
      - ./docker/cda-vsomeip.json:/etc/vsomeip/vsomeip.json:ro
    environment:
      DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/run/dbus/system_bus_socket"
    networks:
      sovd-net:
        ipv4_address: 172.20.0.11

  # ── SOVD Server (C# .NET 9 AOT REST API) ──────────────────────────────────
  sovd-server:
    build:
      context: .
      dockerfile: docker/sovd-server.Dockerfile
    depends_on:
      - dbus-daemon
      - cda
    volumes:
      - dbus-socket:/run/dbus
    environment:
      SOVD_GATEWAY_IMPL: dbus
      DBUS_SOCKET_PATH: /run/dbus/system_bus_socket
      ASPNETCORE_URLS: http://+:8080
    networks:
      - sovd-net

  # ── Frontend (Vite build → nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - sovd-server
    ports:
      - "8090:80"
    networks:
      - sovd-net

volumes:
  dbus-socket:

networks:
  sovd-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
